<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar contraseña - FitZone</title>
    <link rel="stylesheet" th:href="@{/css/login.css}" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* Estilos para mensajes */
        .message {
            padding: 12px 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            font-size: 14px;
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeInDown 0.5s forwards;
            position: relative;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        
        .error-message {
            background-color: rgba(255, 0, 0, 0.1);
            border-left: 4px solid #ff3333;
            color: #fff;
        }
        
        .success-message {
            background-color: rgba(76, 175, 80, 0.1);
            border-left: 4px solid #4CAF50;
            color: #fff;
        }

        .close-btn {
            position: absolute;
            right: 10px;
            top: 10px;
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 16px;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .close-btn:hover {
            opacity: 1;
        }

        @keyframes fadeInDown {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Indicador de fortaleza de la contraseña */
        .password-strength {
            margin-bottom: 15px;
            padding: 5px 0;
            font-size: 14px;
            color: #aaa;
            text-align: left;
            position: relative;
        }
        
        .password-strength-bar {
            height: 4px;
            width: 100%;
            background-color: #222;
            border-radius: 2px;
            margin-top: 5px;
            overflow: hidden;
        }
        
        .password-strength-value {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background-color 0.3s ease;
        }
        
        .strength-text {
            font-size: 12px;
            margin-top: 5px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        /* Requisitos de contraseña */
        .password-requirements {
            text-align: left;
            margin-bottom: 15px;
            font-size: 12px;
            color: #aaa;
            line-height: 1.5;
        }
        
        .password-requirements ul {
            padding-left: 15px;
            margin-top: 5px;
        }
        
        .password-requirements li {
            margin-bottom: 3px;
            opacity: 0.7;
            transition: opacity 0.3s, color 0.3s;
        }
        
        .password-requirements li.met {
            color: #4CAF50;
            opacity: 1;
        }
        
        /* Mejora visual para el botón de volver */
        .back-button {
            margin-top: 15px;
            display: inline-block;
            text-decoration: none;
            color: #fff;
            font-weight: 500;
            transition: all 0.3s;
            text-align: center;
            padding: 8px 0;
        }

        .back-button:hover {
            text-shadow: 0 0 5px #45f3ff;
        }
    </style>
</head>
<body>
    <!-- Logo 3D Fitzone -->
    <div class="logo-3d">
        <span>F</span><span>I</span><span>T</span><span>Z</span><span>O</span><span>N</span><span>E</span>
    </div>

    <div class="box">
        <span class="borderLine"></span>
        <form th:action="@{/cambiar-contrasena}" method="post">
            <h2>Nueva contraseña</h2>
            
            <!-- Sistema de mensajes -->
            <div th:if="${error}" class="message error-message">
                <button type="button" class="close-btn">&times;</button>
                <span th:text="${error}"></span>
            </div>
            
            <div th:if="${mensaje}" class="message success-message">
                <button type="button" class="close-btn">&times;</button>
                <span th:text="${mensaje}"></span>
            </div>
            
            <input type="hidden" name="token" th:value="${token}">
            
            <div class="inputBox">
                <input type="password" name="nuevaContrasena" id="password" required="required">
                <span>Nueva contraseña</span>
                <i></i>
            </div>
            
            <!-- Indicador de fortaleza -->
            <div class="
